<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengaluru House Price Predictor</title>

    <!-- Faster Bootstrap CDN -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Loader */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            flex-direction: column;
        }

        .spinner-border {
            width: 4rem;
            height: 4rem;
            margin-bottom: 15px;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.6s ease-in-out;
        }

        .title {
            font-weight: 700;
            color: #0f172a;
        }

        .result-box {
            font-size: 1.15rem;
            font-weight: 600;
            color: #198754;
            margin-top: 20px;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
        }

        .btn-primary {
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: scale(1.02);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner-border text-light" role="status"></div>
        Loading Bengaluru House Predictor...
    </div>

    <div class="container" id="main-content" style="display:none;">
        <div class="row justify-content-center w-100">
            <div class="col-lg-7 col-md-9">
                <div class="card p-4 bg-white">
                    <h2 class="text-center mb-4 title">Bengaluru House Price Predictor</h2>

                    <form action="/predict" method="post">
                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <select class="form-select" id="location" name="location" required>
                                <option value="">Select Location</option>
                                {% for location in locations %}
                                <option value="{{ location }}">{{ location }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="total_sqft" class="form-label">Total Square Feet</label>
                            <input type="number" step="any" class="form-control"
                                   id="total_sqft" name="total_sqft"
                                   placeholder="Enter area in sqft" required>
                        </div>

                        <div class="mb-3">
                            <label for="bhk" class="form-label">BHK</label>
                            <input type="number" class="form-control"
                                   id="bhk" name="bhk"
                                   placeholder="Enter BHK" required>
                        </div>

                        <div class="mb-3">
                            <label for="bath" class="form-label">Bathrooms</label>
                            <input type="number" step="any" class="form-control"
                                   id="bath" name="bath"
                                   placeholder="Enter number of bathrooms" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Predict Price
                        </button>
                    </form>

                    {% if prediction_text %}
                    <div class="result-box">
                        {{ prediction_text }}
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <!-- 2 Second Loader -->
    <script>
        window.addEventListener("load", function () {
            setTimeout(function () {
                document.getElementById("loader").style.display = "none";
                document.getElementById("main-content").style.display = "block";
            }, 2000);
        });
    </script>

</body>
</html>
